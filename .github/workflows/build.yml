# 태그 push 시 자동으로 exe 빌드 + Release 생성
name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name Damagochi --clean ^
            --add-data "data;data" ^
            --add-data "gui;gui" ^
            --add-data "pet;pet" ^
            --add-data "minigames;minigames" ^
            --add-data "network;network" ^
            --hidden-import pygame ^
            --hidden-import bleak ^
            --hidden-import bless ^
            launcher.py
        shell: cmd
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Damagochi.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
